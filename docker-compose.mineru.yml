# Start the local MinerU API used by the .NET backend:
#   docker compose -f docker-compose.mineru.yml up -d

services:
  mineru-api:
    build:
      context: .
      dockerfile: docker/mineru/Dockerfile
    image: mineru:latest
    container_name: english4skills-mineru
    command: ["mineru-api", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8010:8000"
    environment:
      MINERU_MODEL_SOURCE: "${MINERU_MODEL_SOURCE:-huggingface}"
      MINERU_API_MAX_CONCURRENT_REQUESTS: "1"
      MINERU_API_OUTPUT_ROOT: "/data/output"
    volumes:
      - ./.runtime/mineru-output:/data/output
    shm_size: "32g"
    ipc: host
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
